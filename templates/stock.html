<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票詳情 — FinPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#060810; --bg2:#0d1117; --bg3:#161b26; --border:#21273a; --text:#e6eaf4; --muted:#5c6a85; --up:#00e676; --down:#ff3d5a; --accent:#4f8ef7; }
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Space Grotesk',sans-serif;padding:20px}
    a.back{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--accent);text-decoration:none}
    .hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:18px;margin:14px 0}
    .hero-grid{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .hero-left{flex:1}
    .sym{font-family:'JetBrains Mono',monospace;font-size:28px;color:var(--accent);font-weight:700}
    .name{color:var(--muted);margin-top:4px}
    .hero-right{text-align:right}
    .price{font-family:'JetBrains Mono',monospace;font-size:42px;margin-bottom:6px}
    .star-btn { background:none; border:1px solid var(--border); color:var(--gold); font-size:20px; padding:6px 10px; border-radius:8px; cursor:pointer }
    .star-btn:hover { transform:scale(1.08) }
    .price.flash-up{color:var(--up);text-shadow:0 0 14px rgba(0,230,118,0.3)}
    .price.flash-down{color:var(--down);text-shadow:0 0 14px rgba(255,61,90,0.3)}
    .change{font-family:'JetBrains Mono',monospace;padding:6px 10px;border-radius:8px}
    .change.up{background:rgba(0,230,118,0.08);color:var(--up)}
    .change.down{background:rgba(255,61,90,0.08);color:var(--down)}
    .meta{font-size:12px;color:var(--muted);margin-top:8px}
    .chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:12px}
  </style>
</head>
<body>
  <a class="back" href="/">← 返回首頁</a>
  <div class="hero" id="hero">
    <div class="hero-grid">
      <div class="hero-left">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="sym" id="heroSym">--</div>
          <button id="heroStar" class="star-btn" title="加入自選">☆</button>
        </div>
        <div class="name" id="heroName">載入中...</div>
        <div class="meta" id="heroMeta"></div>
      </div>
      <div class="hero-right">
        <div class="price" id="heroPrice">--</div>
        <div class="change" id="heroChange">--</div>
        <div class="meta" id="heroUpdated">最後更新: --</div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="histChart" height="120"></canvas>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    let API = '/api';
    if (typeof window !== 'undefined' && window.__API_BASE__ !== undefined) {
      API = window.__API_BASE__ || API;
    }
    const path = window.location.pathname.split('/').pop();
    const sym = decodeURIComponent(path || '');
    const elSym = document.getElementById('heroSym');
    const elName = document.getElementById('heroName');
    const elPrice = document.getElementById('heroPrice');
    const elChange = document.getElementById('heroChange');
    const elUpdated = document.getElementById('heroUpdated');
    elSym.textContent = sym;
    const heroStar = document.getElementById('heroStar');
    let inWatch = (JSON.parse(localStorage.getItem('fp_watchlist')||'[]').includes(sym));
    function updateHeroStar(){ heroStar.textContent = inWatch? '★':'☆'; heroStar.title = inWatch? '移除自選':'加入自選'; }
    heroStar.addEventListener('click', (e)=>{ e.stopPropagation(); inWatch = !inWatch; const wl = JSON.parse(localStorage.getItem('fp_watchlist')||'[]'); if(inWatch){ if(!wl.includes(sym)) wl.push(sym);}else{ const i=wl.indexOf(sym); if(i>-1) wl.splice(i,1);} localStorage.setItem('fp_watchlist', JSON.stringify(wl)); updateHeroStar(); });
    updateHeroStar();

    function fmt(n,d=2){ if(n==null||isNaN(n)) return '--'; return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }

    async function loadDetail(){
      try{
        const r = await fetch(`${API}/stock/${encodeURIComponent(sym)}/detail`);
        const j = await r.json();
        const d = j.data || {};
        elName.textContent = d.name || '';
        const price = d.price || 0; const change = d.change || 0; const pct = d.change_pct || 0;
        flashHero(price, change);
        elChange.textContent = `${pct>0?'+':''}${pct}%  ${change>=0?'+':''}${fmt(change)}`;
        elChange.className = `change ${pct>0?'up':pct<0?'down':''}`;
        elUpdated.textContent = '最後更新: ' + new Date().toLocaleString();
      }catch(e){ console.error(e); }
    }

    let chart;
    let currentInterval = '1d';
    const intervalMap = {
      '1m': { period: '7d', interval: '1m' },
      '5m': { period: '7d', interval: '5m' },
      '30m': { period: '30d', interval: '30m' },
      '1d': { period: '1y', interval: '1d' },
      '1w': { period: '5y', interval: '1wk' },
      '1M': { period: '10y', interval: '1mo' },
    };

    // insert interval controls
    const chartWrap = document.querySelector('.chart-wrap');
    const controls = document.createElement('div');
    controls.style.display = 'flex'; controls.style.gap = '8px'; controls.style.marginBottom = '8px';
    ['1m','5m','30m','1d','1w','1M'].forEach(iv=>{
      const b = document.createElement('button'); b.textContent = iv; b.className='star-btn'; b.style.border='1px solid var(--border)'; b.style.background='var(--bg2)'; b.onclick = ()=>{ currentInterval=iv; loadHistory(); }; controls.appendChild(b);
    });
    chartWrap.prepend(controls);

    async function loadHistory(){
      try{
        const map = intervalMap[currentInterval] || intervalMap['1d'];
        const r = await fetch(`${API}/stock/${encodeURIComponent(sym)}/history?period=${map.period}&interval=${map.interval}`);
        const j = await r.json();
        const rows = j.data || [];
        if(!rows.length) return;
        // prepare candlestick data for chartjs-financial
        const candles = rows.map(r=>({ x: r.date, o: r.open, h: r.high, l: r.low, c: r.close }));
        const ctx = document.getElementById('histChart').getContext('2d');
        if(chart) chart.destroy();
        // load financial plugin if not present
        if(typeof Chart.controllers.candlestick === 'undefined'){
          await new Promise((res,rej)=>{
            const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s);
          }).catch(()=>{});
        }
        chart = new Chart(ctx, { type: 'candlestick', data: { datasets:[{ label: sym, data: candles }] }, options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ x:{ type:'time', time:{ tooltipFormat:'yyyy-MM-dd HH:mm' } } } } });
      }catch(e){ console.error('hist', e); }
    }

    function flashHero(price, change){
      const prev = parseFloat(elPrice.dataset.prev || '0');
      const newP = Number(price||0);
      if(!isNaN(prev) && prev !== 0 && prev !== newP){
        const cls = newP > prev ? 'flash-up' : 'flash-down';
        elPrice.classList.add(cls);
        setTimeout(()=>elPrice.classList.remove(cls),800);
      }
      elPrice.textContent = fmt(newP);
      elPrice.dataset.prev = newP;
    }

    async function loadFlows(){
      try{
        const r = await fetch(`${API}/stock/${encodeURIComponent(sym)}/flows`);
        const j = await r.json();
        const rows = j.data || [];
        const wrap = document.createElement('div'); wrap.style.marginTop='12px'; wrap.innerHTML = `<div style="font-size:14px;font-weight:600;margin-bottom:6px">法人買賣超</div>`;
        if(!rows.length){ wrap.innerHTML += '<div style="color:var(--muted)">無資料</div>'; document.body.appendChild(wrap); return; }
        const t = document.createElement('table'); t.className='stock-table'; t.style.marginTop='6px'; t.innerHTML = `<thead><tr><th>日期</th><th>外資淨額</th><th>投信淨額</th><th>自營商淨額</th></tr></thead>` + `<tbody>${rows.map(r=>`<tr><td>${r.date}</td><td>${r.foreign_net.toLocaleString()||0}</td><td>${r.trust_net.toLocaleString()||0}</td><td>${r.dealer_net.toLocaleString()||0}</td></tr>`).join('')}</tbody>`;
        wrap.appendChild(t); document.body.appendChild(wrap);
      }catch(e){ console.error('flows', e); }
    }

    async function loadFinancials(detail){
      try{
        const wrap = document.createElement('div'); wrap.style.marginTop='12px'; wrap.innerHTML = `<div style="font-size:14px;font-weight:600;margin-bottom:6px">財務摘要</div>`;
        const rows = [`市值: ${detail.market_cap||0}`, `營收: ${detail.revenue||0}`, `毛利: ${detail.gross_profit||0}`, `淨利: ${detail.net_income||0}`, `PE: ${detail.pe_ratio||'--'}`, `PB: ${detail.pb_ratio||'--'}`, `EPS: ${detail.eps||'--'}`, `殖利率: ${detail.dividend_yield||'--'}%`];
        wrap.innerHTML += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px">${rows.map(r=>`<div class="stat-card"><div class="stat-label">${r.split(':')[0]}</div><div class="stat-value">${r.split(':')[1]||''}</div></div>`).join('')}</div>`;
        document.body.appendChild(wrap);
      }catch(e){ console.error('fin', e); }
    }

    async function init(){ const detailR = await fetch(`${API}/stock/${encodeURIComponent(sym)}/detail`); const detailJ = await detailR.json(); await loadDetail(); await loadHistory(); await loadFlows(); loadFinancials(detailJ.data || {}); }
    init();
    setInterval(()=>{ loadDetail(); loadHistory(); },30000);
  </script>
</body>
</html>
